on: [push, pull_request]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Runs tests
      uses: JJ/raku-test-action@v2
  specs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Raku
      uses: JJ/raku-test-action@v2
    - name: Runs specs
      run: raku -Ilib bin/behave
