site_name: BDD::Behave
site_url: https://gdonald.github.io/BDD-Behave/
repo_url: https://github.com/gdonald/BDD-Behave
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Running Specs: running.md
  - Core:
    - describe / context: core/describe.md
    - it: core/it.md
    - pending: core/pending.md
  - let:
    - let / let-bang: let/let.md
    - subject / subject-bang: let/subject.md
  - Hooks: hooks/hooks.md
  - Shared Contexts: shared-contexts/shared-contexts.md
  - Shared Examples: shared-examples/shared-examples.md
  - Tags: tags/tags.md
  - Focus and Skip: focus-skip/focus-skip.md
  - Example Filter: example-filter/example-filter.md
  - Parallel Execution: parallel/parallel.md
  - Watch Mode: watch/watch.md
  - Retry and Only-Failures: retry/retry.md
  - Mocks: mocks/mocks.md
  - Expectations:
    - expect: expectations/expect.md
    - Matchers: expectations/matchers.md
    - Custom Matchers: expectations/custom-matchers.md
    - Composable Matchers: expectations/composable-matchers.md
    - Junctions: expectations/junctions.md
    - aggregate-failures: expectations/aggregate-failures.md
  - Diff Output: diff/diff.md
  - Formatters: formatter/formatter.md
  - Configuration: configuration/configuration.md
  - Code Coverage: coverage/coverage.md
  - Doc Extraction: doc-extraction/doc-extraction.md
  - Timing: timing/timing.md
  - Classes in specs: classes/classes.md
  - Variables in specs: variables/variables.md
  - Contributing: contributing.md
theme:
  name: 'material'
markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
