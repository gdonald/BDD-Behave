site_name: BDD::Behave
site_url: https://gdonald.github.io/BDD-Behave/
repo_url: https://github.com/gdonald/BDD-Behave
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - DSL:
    - describe / context: dsl/describe.md
    - it: dsl/it.md
    - let: dsl/let.md
    - Hooks: dsl/hooks.md
    - Shared Contexts: dsl/shared-contexts.md
    - Shared Examples: dsl/shared-examples.md
    - Tags: dsl/tags.md
    - Focus and Skip: dsl/focus-skip.md
    - Doubles: dsl/mocks.md
    - expect: dsl/expect.md
    - Matchers: dsl/matchers.md
    - Diff Output: dsl/diff.md
  - Running Specs: running.md
  - Tests: testing.md
theme:
  name: 'material'
markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
